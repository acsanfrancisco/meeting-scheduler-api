#Application Name
spring.application.name=meeting-scheduler-api
#Spring Configuration Properties
spring.config.import=optional:file:.env[.properties]
#JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
#Swagger
springdoc.swagger-ui.path=/docs-students-management.html
springdoc.api-docs.path=/docs-students-management
#My SQL
server.port=${SERVER_PORT_KEY}
spring.datasource.url=${MYSQL_URL_KEY}
spring.datasource.username=${MYSQL_USER_KEY}
spring.datasource.password=${MYSQL_PASSWORD_KEY}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
